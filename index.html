<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#07080f" />
    <title>Wheel of Legends</title>
    <style>
      html, body { margin: 0; width: 100%; height: 100%; background: #07080f; overflow: hidden; }
      body { position: fixed; inset: 0; height: 100dvh; overscroll-behavior: none; touch-action: none; user-select: none; -webkit-user-select: none; }
      #app { position: fixed; inset: 0; width: 100%; height: 100%; height: 100dvh; background: #07080f; }
      #game { position: absolute; top: env(safe-area-inset-top); right: env(safe-area-inset-right); bottom: env(safe-area-inset-bottom); left: env(safe-area-inset-left); overflow: hidden; }
      #game canvas { display: block; width: 100%; height: 100%; }
      #rotate-device { display: none; position: absolute; inset: 0; z-index: 10; align-items: center; justify-content: center; flex-direction: column; gap: 18px; padding: 32px; box-sizing: border-box; color: #e8ecf8; text-align: center; font-family: Bahnschrift, "Arial Narrow", "Segoe UI", sans-serif; background: radial-gradient(circle at center, #142042, #07080f 70%); }
      #rotate-device .phone { font-size: 64px; transform: rotate(90deg); }
      #rotate-device strong { color: #f5c542; font: bold 28px Cambria, "Times New Roman", serif; letter-spacing: 1px; }
      #rotate-device span { color: #8a92a6; font-size: 15px; max-width: 300px; }
      @media (orientation: portrait) {
        #game { visibility: hidden; }
        #rotate-device { display: flex; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="game"></div>
      <div id="rotate-device" role="status" aria-live="polite">
        <div class="phone">📱</div>
        <strong>ROTATE TO LANDSCAPE</strong>
        <span>Wheel of Legends is designed for a wide battlefield.</span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
